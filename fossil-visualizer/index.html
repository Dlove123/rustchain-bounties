<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fossil Record — Attestation Archaeology Visualizer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🦕 The Fossil Record</h1>
            <p class="subtitle">Attestation Archaeology Visualizer — Geological Layers of Silicon</p>
        </header>
        
        <div id="visualization">
            <svg id="timeline"></svg>
        </div>
        
        <div id="tooltip" class="tooltip"></div>
        
        <div class="legend" id="legend">
            <h3>Architecture Layers</h3>
            <!-- Legend items will be generated by JavaScript -->
        </div>
        
        <div class="stats" id="stats">
            <!-- Stats will be generated by JavaScript -->
        </div>
        
        <footer>
            <p>Data source: RustChain Database | Built with D3.js</p>
            <p>Bounty #2311 — 75 RTC</p>
        </footer>
    </div>
    
    <script src="data.js"></script>
    <script src="processor.js"></script>
    <script src="script.js"></script>
</body>
</html>
