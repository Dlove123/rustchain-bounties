<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 20px; font-family: Arial; background: #1a1a2e; color: #fff; }
    h2 { color: #00d9ff; text-align: center; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; }
    button { width: 100%; padding: 10px; background: #00d9ff; color: #1a1a2e; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #00b8d4; }
    .balance { text-align: center; font-size: 2em; color: #00d9ff; margin: 20px 0; }
    .error { color: #ff6b6b; text-align: center; }
  </style>
</head>
<body>
  <h2>🔗 RustChain Balance</h2>
  <input type="text" id="address" placeholder="Enter RTC address">
  <button id="checkBtn">Check Balance</button>
  <div id="result" class="balance"></div>
  <script src="popup.js"></script>
</body>
</html>
